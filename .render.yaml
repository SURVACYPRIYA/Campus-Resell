services:
  - type: web
    name: campus-resell-backend
    env: node
    # Render will run these commands in the repository root unless rootDir is set
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    # Memory limit can be adjusted in the Render UI; keep default
    # Environment variables – replace <PLACEHOLDER> with actual values or configure secrets in Render
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: "production"
      - key: MONGO_URI
        value: "<YOUR_MONGODB_CONNECTION_STRING>"
      - key: JWT_SECRET
        value: "<YOUR_JWT_SECRET>"
      - key: CLOUDINARY_CLOUD_NAME
        value: "<YOUR_CLOUD_NAME>"
      - key: CLOUDINARY_API_KEY
        value: "<YOUR_API_KEY>"
      - key: CLOUDINARY_API_SECRET
        value: "<YOUR_API_SECRET>"
      - key: CLIENT_URL
        value: "<YOUR_VERCEL_FRONTEND_URL>"
